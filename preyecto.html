<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mini Juego Saber Pro</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#4facfe,#00f2fe);
    text-align: center;
    padding: 40px;
}

.contenedor{
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 500px;
    margin: auto;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
}

button{
    margin: 10px;
    padding: 10px 20px;
    border: none;
    background: #4facfe;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover{
    background:#2c8ae8;
}

.botonInicio{
    display:inline-block;
    margin-top:20px;
    padding:10px 20px;
    background:#ff7e5f;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

.botonInicio:hover{
    background:#ff4b2b;
}

#resultado{
    font-weight: bold;
    margin-top: 15px;
}

</style>

</head>

<body>

<div class="contenedor">

<h1>🎓 Mini Juego Saber Pro</h1>

<h2 id="pregunta"></h2>

<div id="opciones"></div>

<p id="resultado"></p>

<h3>Puntaje: <span id="puntaje">0</span></h3>

<button onclick="siguientePregunta()">Siguiente pregunta</button>

<br>

<!-- BOTÓN PARA VOLVER -->
<a href="index.html" class="botonInicio">⬅ Volver al inicio</a>

</div>

<script>

let preguntas = [

{
pregunta: "Si todos los ingenieros son analíticos y Juan es ingeniero, entonces:",
opciones: [
"Juan no es analítico",
"Juan es analítico",
"Juan es médico",
"No se puede saber"
],
respuesta: 1
},

{
pregunta: "¿Cuál número continúa la serie? 2, 4, 8, 16, ?",
opciones: [
"18",
"24",
"32",
"20"
],
respuesta: 2
},

{
pregunta: "En un texto argumentativo, la tesis es:",
opciones: [
"La idea principal que se defiende",
"Un ejemplo del texto",
"El título del texto",
"Una cita textual"
],
respuesta: 0
}

]

let preguntaActual = 0
let puntaje = 0

function cargarPregunta(){

let p = preguntas[preguntaActual]

document.getElementById("pregunta").innerText = p.pregunta

let opcionesHTML = ""

p.opciones.forEach((opcion,index)=>{

opcionesHTML += `<button onclick="verificarRespuesta(${index})">${opcion}</button><br>`

})

document.getElementById("opciones").innerHTML = opcionesHTML

document.getElementById("resultado").innerText = ""

}

function verificarRespuesta(indice){

let correcta = preguntas[preguntaActual].respuesta

if(indice === correcta){

document.getElementById("resultado").innerText = "✅ Correcto!"
puntaje++
document.getElementById("puntaje").innerText = puntaje

}else{

document.getElementById("resultado").innerText = "❌ Incorrecto"

}

}

function siguientePregunta(){

preguntaActual++

if(preguntaActual >= preguntas.length){

alert("Juego terminado. Puntaje final: " + puntaje)

preguntaActual = 0
puntaje = 0
document.getElementById("puntaje").innerText = puntaje

}

cargarPregunta()

}

cargarPregunta()

</script>

</body>
</html>
